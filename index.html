<!-- 푸시 알림 -->
<section class="page" id="page-push">
  <div class="page-header">
    <h1>푸시 알림</h1>
  </div>

  <!-- 알림 보내기 카드 -->
  <div class="card" style="margin-bottom:20px;">
    <div class="card-header"><span class="card-title">알림 보내기</span></div>

    <p id="push-edit-notice" class="hidden" style="font-size:12px; color:#b466ff; margin-bottom:12px; padding:10px 12px; background:rgba(180,102,255,0.1); border-radius:8px; line-height:1.5;"></p>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <div class="form-group" style="margin-bottom:0">
        <label>발송 앱</label>
        <select id="push-appid"><option value="all">전체 앱</option></select>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>알림 제목</label>
        <input type="text" id="push-title" placeholder="알림 제목을 입력하세요" />
      </div>
    </div>
    <div class="form-group" style="margin-top:12px;">
      <label>알림 내용</label>
      <textarea id="push-body" rows="2" placeholder="알림 내용을 입력하세요..."></textarea>
    </div>
    <div class="form-actions" style="flex-direction:column; gap:8px;">
      <button id="push-new-btn" class="btn-secondary full hidden">✕ 편집 취소 / 새로 작성</button>
      <button class="btn-primary full" id="send-push-btn">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:white;margin-right:6px;vertical-align:middle"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        발송하기
      </button>
    </div>
  </div>

  <!-- 발송 내역 테이블 -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">발송 내역</span>
      <span id="push-total-count" style="font-size:11px; color:var(--text-muted);">전체 0건</span>
    </div>

    <!-- 검색 필터 -->
    <div style="display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:flex-end;">
      <div style="flex:1; min-width:180px;">
        <input type="text" id="push-search" class="search-input" style="width:100%;" placeholder="제목 또는 내용 검색..." />
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <input type="date" id="push-date-from" style="background:var(--bg-primary); border:0.5px solid var(--border-light); border-radius:8px; padding:8px 10px; font-size:12px; color:var(--text-primary); outline:none;" />
        <span style="color:var(--text-muted); font-size:12px;">~</span>
        <input type="date" id="push-date-to" style="background:var(--bg-primary); border:0.5px solid var(--border-light); border-radius:8px; padding:8px 10px; font-size:12px; color:var(--text-primary); outline:none;" />
        <button id="push-search-btn" class="btn-sm" style="white-space:nowrap;">🔍 검색</button>
        <button id="push-reset-btn" class="btn-sm" style="white-space:nowrap;">초기화</button>
      </div>
    </div>

    <!-- 테이블 -->
    <table class="data-table">
      <thead>
        <tr>
          <th style="width:40px;">#</th>
          <th style="width:180px;">제목</th>
          <th>내용</th>
          <th style="width:80px;">앱</th>
          <th style="width:110px;">발송 일시</th>
          <th style="width:80px;">작업</th>
        </tr>
      </thead>
      <tbody id="push-history-tbody">
        <tr><td colspan="6" class="empty-msg">로딩 중...</td></tr>
      </tbody>
    </table>
  </div>
</section>
